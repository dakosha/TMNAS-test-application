<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Cars List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        h2 {
            color: #333;
        }
        .cars-table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .cars-table th {
            background-color: #0066cc;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
        }
        .cars-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
        }
        .cars-table tr:last-child td {
            border-bottom: none;
        }
        .cars-table tr:hover td {
            background-color: #f0f7ff;
        }
        .nav-link {
            display: inline-block;
            margin-top: 20px;
            color: #0066cc;
            text-decoration: none;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</h:head>
<h:body>
    <h2>Cars List</h2>
    <h:dataTable value="#{carsBean.cars}" var="car" styleClass="cars-table"
                 headerClass="cars-header" rowClasses="cars-row">
        <h:column>
            <f:facet name="header">Make</f:facet>
            #{car.make}
        </h:column>
        <h:column>
            <f:facet name="header">Model</f:facet>
            #{car.model}
        </h:column>
        <h:column>
            <f:facet name="header">Year</f:facet>
            #{car.year}
        </h:column>
    </h:dataTable>
    <a class="nav-link" href="person.xhtml">View Person Info</a>
    <br/>
    <a class="nav-link" href="hello.xhtml">Back to Hello</a>
</h:body>
</html>
